buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.9.24"
        firebaseBomVersion = "32.7.4"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath('com.google.gms:google-services:4.4.4')
    }
}

// Force all 3rd-party React Native packages to use SDK 34,
// preventing them from secretly requesting SDK 35 and crashing the AGP 8.1 compiler.
// Suppress Kotlin compiler metadata version panic when Google Play APIs enforce newer kotlin-stdlib jars (2.1/2.2) against our locked RN 1.8.0 compiler.
allprojects {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            freeCompilerArgs += ['-Xskip-metadata-version-check']
        }
    }
}

subprojects {
    configurations.all {
        resolutionStrategy {
            // Force browser library to a version that supports compileSdk 34
            // (1.10.0 requires compileSdk 36 and breaks the build)
            force 'androidx.browser:browser:1.8.0'
        }
    }
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdkVersion 34
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
